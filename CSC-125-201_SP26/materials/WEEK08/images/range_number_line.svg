<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Row 1: range(5) -->
  <text x="10" y="30" font-size="12" fill="#3c2a1a" font-family="'Consolas', monospace" font-weight="bold">range(5)</text>
  <g transform="translate(130, 12)">
    <rect x="0" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="21" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">0</text>
    <rect x="50" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="71" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">1</text>
    <rect x="100" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="121" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">2</text>
    <rect x="150" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="171" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">3</text>
    <rect x="200" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="221" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">4</text>
    <!-- Stop marker -->
    <rect x="250" y="0" width="42" height="28" rx="3" fill="#ffebee" stroke="#b85c38" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="271" y="19" text-anchor="middle" font-size="13" fill="#b85c38" font-weight="bold">5</text>
  </g>
  <text x="440" y="30" font-size="11" fill="#b85c38" font-style="italic">stops before 5</text>

  <!-- Row 2: range(1, 6) -->
  <text x="10" y="85" font-size="12" fill="#3c2a1a" font-family="'Consolas', monospace" font-weight="bold">range(1, 6)</text>
  <g transform="translate(130, 67)">
    <!-- Skip marker -->
    <rect x="0" y="0" width="42" height="28" rx="3" fill="#f0f0f0" stroke="#d9cfc2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="21" y="19" text-anchor="middle" font-size="13" fill="#d9cfc2" font-weight="bold">0</text>
    <rect x="50" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="71" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">1</text>
    <rect x="100" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="121" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">2</text>
    <rect x="150" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="171" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">3</text>
    <rect x="200" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="221" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">4</text>
    <rect x="250" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="271" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">5</text>
    <!-- Stop marker -->
    <rect x="300" y="0" width="42" height="28" rx="3" fill="#ffebee" stroke="#b85c38" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="321" y="19" text-anchor="middle" font-size="13" fill="#b85c38" font-weight="bold">6</text>
  </g>
  <text x="500" y="85" font-size="11" fill="#7a5c4f" font-style="italic">starts at 1, stops before 6</text>

  <!-- Row 3: range(0, 10, 2) -->
  <text x="10" y="140" font-size="12" fill="#3c2a1a" font-family="'Consolas', monospace" font-weight="bold">range(0, 10, 2)</text>
  <g transform="translate(130, 122)">
    <rect x="0" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="21" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">0</text>
    <!-- Skip 1 -->
    <rect x="50" y="0" width="42" height="28" rx="3" fill="#f0f0f0" stroke="#d9cfc2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="71" y="19" text-anchor="middle" font-size="13" fill="#d9cfc2">1</text>
    <rect x="100" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="121" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">2</text>
    <!-- Skip 3 -->
    <rect x="150" y="0" width="42" height="28" rx="3" fill="#f0f0f0" stroke="#d9cfc2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="171" y="19" text-anchor="middle" font-size="13" fill="#d9cfc2">3</text>
    <rect x="200" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="221" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">4</text>
    <!-- Skip 5 -->
    <rect x="250" y="0" width="42" height="28" rx="3" fill="#f0f0f0" stroke="#d9cfc2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="271" y="19" text-anchor="middle" font-size="13" fill="#d9cfc2">5</text>
    <rect x="300" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="321" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">6</text>
    <!-- Skip 7 -->
    <rect x="350" y="0" width="42" height="28" rx="3" fill="#f0f0f0" stroke="#d9cfc2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="371" y="19" text-anchor="middle" font-size="13" fill="#d9cfc2">7</text>
    <rect x="400" y="0" width="42" height="28" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
    <text x="421" y="19" text-anchor="middle" font-size="13" fill="#3c2a1a" font-weight="bold">8</text>
  </g>
  <text x="580" y="140" font-size="11" fill="#7a5c4f" font-style="italic">step of 2, skips odd numbers</text>

  <!-- Legend -->
  <g transform="translate(560, 160)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1"/>
    <text x="20" y="12" font-size="10" fill="#3c2a1a">Included</text>
    <rect x="80" y="0" width="14" height="14" rx="2" fill="#ffebee" stroke="#b85c38" stroke-width="1" stroke-dasharray="3,1"/>
    <text x="100" y="12" font-size="10" fill="#b85c38">Stop (excluded)</text>
  </g>
</svg>
