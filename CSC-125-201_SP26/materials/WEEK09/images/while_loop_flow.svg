<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="'Segoe UI', Arial, sans-serif">
  <text x="400" y="18" text-anchor="middle" font-size="14" fill="#7a5c4f" font-weight="bold">How a while Loop Works</text>

  <!-- Start box -->
  <rect x="20" y="75" width="80" height="40" rx="6" fill="#f3ece1" stroke="#c08b5c" stroke-width="1.5"/>
  <text x="60" y="100" text-anchor="middle" font-size="11" fill="#3c2a1a" font-weight="bold">Start</text>

  <!-- Arrow: Start to Condition -->
  <line x1="100" y1="95" x2="165" y2="95" stroke="#c08b5c" stroke-width="2" marker-end="url(#arrowCar)"/>

  <!-- Condition diamond -->
  <polygon points="250,55 340,95 250,135 160,95" fill="#fff3cd" stroke="#d4913d" stroke-width="1.5"/>
  <text x="250" y="92" text-anchor="middle" font-size="11" fill="#3c2a1a" font-weight="bold">Condition</text>
  <text x="250" y="106" text-anchor="middle" font-size="10" fill="#b85c38" font-family="'Consolas', monospace">True?</text>

  <!-- Arrow: Condition True to Body -->
  <line x1="340" y1="95" x2="410" y2="95" stroke="#c08b5c" stroke-width="2" marker-end="url(#arrowCar)"/>
  <text x="375" y="85" text-anchor="middle" font-size="10" fill="#7d8c6e" font-weight="bold">True</text>

  <!-- Body box -->
  <rect x="415" y="70" width="170" height="50" rx="6" fill="#2c2118" stroke="#c08b5c" stroke-width="1.5"/>
  <text x="500" y="92" text-anchor="middle" font-size="11" fill="#e8ddd0" font-weight="bold">Loop Body</text>
  <text x="500" y="108" text-anchor="middle" font-size="10" fill="#c08b5c" font-style="italic">Indented code runs</text>

  <!-- Arrow: Body loops back to Condition -->
  <path d="M 500 120 L 500 175 L 250 175 L 250 135" fill="none" stroke="#b85c38" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRust)"/>
  <text x="375" y="192" text-anchor="middle" font-size="10" fill="#b85c38">Check condition again</text>

  <!-- Arrow: Condition False to Continue -->
  <line x1="250" y1="55" x2="250" y2="35" stroke="#7d8c6e" stroke-width="2"/>
  <line x1="250" y1="35" x2="700" y2="35" stroke="#7d8c6e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="450" y="28" text-anchor="middle" font-size="10" fill="#b85c38" font-weight="bold">False</text>

  <!-- Done box -->
  <rect x="705" y="15" width="80" height="40" rx="6" fill="#e8f5e8" stroke="#7d8c6e" stroke-width="1.5"/>
  <text x="745" y="40" text-anchor="middle" font-size="11" fill="#3c2a1a" font-weight="bold">Continue</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowCar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c08b5c"/>
    </marker>
    <marker id="arrowRust" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b85c38"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d8c6e"/>
    </marker>
  </defs>
</svg>
