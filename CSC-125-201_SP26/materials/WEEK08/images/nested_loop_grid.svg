<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Title -->
  <text x="260" y="20" text-anchor="middle" font-size="14" fill="#7a5c4f" font-weight="bold">Nested Loop Execution</text>

  <!-- Column headers -->
  <text x="175" y="48" text-anchor="middle" font-size="11" fill="#7a5c4f" font-weight="bold">col 0</text>
  <text x="245" y="48" text-anchor="middle" font-size="11" fill="#7a5c4f" font-weight="bold">col 1</text>
  <text x="315" y="48" text-anchor="middle" font-size="11" fill="#7a5c4f" font-weight="bold">col 2</text>
  <text x="385" y="48" text-anchor="middle" font-size="11" fill="#7a5c4f" font-weight="bold">col 3</text>

  <!-- Row headers -->
  <text x="115" y="82" text-anchor="middle" font-size="11" fill="#b85c38" font-weight="bold">row 0</text>
  <text x="115" y="132" text-anchor="middle" font-size="11" fill="#b85c38" font-weight="bold">row 1</text>
  <text x="115" y="182" text-anchor="middle" font-size="11" fill="#b85c38" font-weight="bold">row 2</text>

  <!-- Outer loop bracket -->
  <text x="52" y="130" text-anchor="middle" font-size="10" fill="#b85c38" font-style="italic" transform="rotate(-90, 52, 130)">outer loop</text>
  <line x1="72" y1="60" x2="72" y2="195" stroke="#b85c38" stroke-width="1.5"/>
  <line x1="72" y1="60" x2="80" y2="60" stroke="#b85c38" stroke-width="1.5"/>
  <line x1="72" y1="195" x2="80" y2="195" stroke="#b85c38" stroke-width="1.5"/>

  <!-- Inner loop bracket -->
  <text x="280" y="210" text-anchor="middle" font-size="10" fill="#7d8c6e" font-style="italic">inner loop (runs fully per row)</text>

  <!-- Grid cells - Row 0 -->
  <rect x="148" y="58" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="175" y="80" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(0,0)</text>
  <rect x="218" y="58" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="245" y="80" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(0,1)</text>
  <rect x="288" y="58" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="315" y="80" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(0,2)</text>
  <rect x="358" y="58" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="385" y="80" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(0,3)</text>

  <!-- Row 0 arrow -->
  <line x1="413" y1="75" x2="440" y2="75" stroke="#7d8c6e" stroke-width="1.5" marker-end="url(#arrowSage)"/>

  <!-- Grid cells - Row 1 -->
  <rect x="148" y="108" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="175" y="130" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(1,0)</text>
  <rect x="218" y="108" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="245" y="130" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(1,1)</text>
  <rect x="288" y="108" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="315" y="130" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(1,2)</text>
  <rect x="358" y="108" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="385" y="130" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(1,3)</text>

  <!-- Row 1 arrow -->
  <line x1="413" y1="125" x2="440" y2="125" stroke="#7d8c6e" stroke-width="1.5" marker-end="url(#arrowSage)"/>

  <!-- Grid cells - Row 2 -->
  <rect x="148" y="158" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="175" y="180" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(2,0)</text>
  <rect x="218" y="158" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="245" y="180" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(2,1)</text>
  <rect x="288" y="158" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="315" y="180" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(2,2)</text>
  <rect x="358" y="158" width="55" height="35" rx="4" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1.2"/>
  <text x="385" y="180" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">(2,3)</text>

  <!-- Row 2 arrow -->
  <line x1="413" y1="175" x2="440" y2="175" stroke="#7d8c6e" stroke-width="1.5" marker-end="url(#arrowSage)"/>

  <!-- Count label -->
  <text x="470" y="82" text-anchor="middle" font-size="10" fill="#7d8c6e">4 runs</text>
  <text x="470" y="132" text-anchor="middle" font-size="10" fill="#7d8c6e">4 runs</text>
  <text x="470" y="182" text-anchor="middle" font-size="10" fill="#7d8c6e">4 runs</text>

  <!-- Total -->
  <text x="470" y="208" text-anchor="middle" font-size="12" fill="#b85c38" font-weight="bold">= 12 total</text>

  <defs>
    <marker id="arrowSage" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d8c6e"/>
    </marker>
  </defs>
</svg>
