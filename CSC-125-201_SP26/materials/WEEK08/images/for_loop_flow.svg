<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" font-size="14" fill="#7a5c4f" font-weight="bold">How a for Loop Works</text>

  <!-- List box -->
  <rect x="20" y="55" width="140" height="100" rx="6" fill="#f3ece1" stroke="#c08b5c" stroke-width="1.5"/>
  <text x="90" y="48" text-anchor="middle" font-size="12" fill="#7a5c4f" font-weight="bold">List</text>
  <rect x="32" y="65" width="116" height="24" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1"/>
  <text x="90" y="82" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">"apple"</text>
  <rect x="32" y="93" width="116" height="24" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1"/>
  <text x="90" y="110" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">"banana"</text>
  <rect x="32" y="121" width="116" height="24" rx="3" fill="#dce6f0" stroke="#5c3d2e" stroke-width="1"/>
  <text x="90" y="138" text-anchor="middle" font-size="11" fill="#3c2a1a" font-family="'Consolas', monospace">"cherry"</text>

  <!-- Arrow 1: Pick item -->
  <line x1="160" y1="105" x2="230" y2="105" stroke="#c08b5c" stroke-width="2" marker-end="url(#arrowCar)"/>
  <text x="195" y="95" text-anchor="middle" font-size="10" fill="#7a5c4f">Pick one</text>

  <!-- Current item box -->
  <rect x="235" y="80" width="130" height="50" rx="6" fill="#fff3cd" stroke="#d4913d" stroke-width="1.5"/>
  <text x="300" y="100" text-anchor="middle" font-size="11" fill="#3c2a1a" font-weight="bold">Current item</text>
  <text x="300" y="118" text-anchor="middle" font-size="12" fill="#b85c38" font-family="'Consolas', monospace">fruit</text>

  <!-- Arrow 2: Run body -->
  <line x1="365" y1="105" x2="435" y2="105" stroke="#c08b5c" stroke-width="2" marker-end="url(#arrowCar)"/>
  <text x="400" y="95" text-anchor="middle" font-size="10" fill="#7a5c4f">Run body</text>

  <!-- Code body box -->
  <rect x="440" y="75" width="180" height="60" rx="6" fill="#2c2118" stroke="#c08b5c" stroke-width="1.5"/>
  <text x="530" y="100" text-anchor="middle" font-size="11" fill="#e8ddd0" font-family="'Consolas', monospace">print(fruit)</text>
  <text x="530" y="118" text-anchor="middle" font-size="10" fill="#c08b5c" font-style="italic">Indented code</text>

  <!-- Arrow 3: Loop back -->
  <path d="M 530 135 L 530 170 L 90 170 L 90 155" fill="none" stroke="#b85c38" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRust)"/>
  <text x="310" y="185" text-anchor="middle" font-size="10" fill="#b85c38">Go back for the next item</text>

  <!-- Arrow 4: Done -->
  <line x1="620" y1="105" x2="700" y2="105" stroke="#7d8c6e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="660" y="95" text-anchor="middle" font-size="10" fill="#7d8c6e">All done</text>

  <!-- Done box -->
  <rect x="705" y="85" width="80" height="40" rx="6" fill="#e8f5e8" stroke="#7d8c6e" stroke-width="1.5"/>
  <text x="745" y="110" text-anchor="middle" font-size="11" fill="#3c2a1a" font-weight="bold">Continue</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowCar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c08b5c"/>
    </marker>
    <marker id="arrowRust" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b85c38"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d8c6e"/>
    </marker>
  </defs>
</svg>
